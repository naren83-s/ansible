- name: demo on data types
  hosts: local
  connection: local
  vars:
    PROGRAM: "DevSecOps with AWS"
    DURATION: 140
    IS_LIVE: true
    DETAILS:
      MONTHS: 4
      TRAINER: "Siva kumar"
    TOPICS:
      - linux
      - shell
      - ansible
  
  tasks:
  - name: print variables
    ansible.builtin.debug:
      msg:
        Program: {{ PROGRAM }}
        Duration: {{ DURATION }}
        Is_live: {{ IS_LIVE }}
        Details: {{ DETAILS }}
        Topics: {{ TOPICS }}
